<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produits E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .product-card {
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
        }
        .product-image {
            height: 200px;
            object-fit: cover;
        }
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .cart-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        .debug-info {
            background-color: #f8f9fa;
            border-left: 4px solid #007bff;
            padding: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <!-- Header -->
        <div class="row mb-4">
            <div class="col-md-8">
                <h2>
                    <i class="bi bi-box"></i> Nos Produits
                </h2>
            </div>
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="bi bi-search"></i>
                    </span>
                    <input
                        type="text"
                        id="searchInput"
                        class="form-control"
                        placeholder="Rechercher un produit..."
                    />
                </div>
            </div>
        </div>

        <!-- Debug Info -->
        <div id="debugInfo" class="debug-info">
            <h6>Informations de Debug:</h6>
            <p class="mb-1"><strong>URL API:</strong> <span id="apiUrl">http://localhost:8085/api/products</span></p>
            <p class="mb-1"><strong>Produits chargés:</strong> <span id="productCount">0</span></p>
            <p class="mb-0"><strong>Statut:</strong> <span id="status">En attente...</span></p>
        </div>

        <!-- Loading -->
        <div id="loadingSpinner" class="loading-spinner">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Chargement...</span>
                </div>
                <p class="mt-3">Chargement des produits...</p>
            </div>
        </div>

        <!-- Products Grid -->
        <div id="productsGrid" class="row" style="display: none;">
            <!-- Products will be inserted here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="alert alert-warning" style="display: none;">
            <i class="bi bi-info-circle"></i> Aucun produit trouvé
        </div>
    </div>

    <!-- Cart Indicator -->
    <div id="cartIndicator" class="cart-indicator" style="display: none;">
        <div class="card">
            <div class="card-body">
                <h6 class="card-title">
                    <i class="bi bi-cart"></i> Panier (<span id="cartCount">0</span>)
                </h6>
                <button class="btn btn-success btn-sm" onclick="viewCart()">
                    Voir le panier
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Messages -->
    <div id="toastContainer" class="position-fixed top-0 end-0 p-3" style="z-index: 1050;"></div>

    <script>
        const API_URL = 'http://localhost:8085/api/products';
        const CART_API_URL = 'http://localhost:8082/api/simple-cart';
        let products = [];
        let cart = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            updateDebugInfo('Initialisation...');
            loadProducts();
            setupSearch();
        });

        function updateDebugInfo(message) {
            document.getElementById('status').textContent = message;
        }

        function showToast(message, type = 'success') {
            const toastHtml = `
                <div class="alert alert-${type === 'error' ? 'danger' : 'success'} d-flex align-items-center" role="alert">
                    <i class="bi bi-${type === 'error' ? 'exclamation-triangle' : 'check-circle'} me-2"></i>
                    <div>${message}</div>
                </div>
            `;
            
            const container = document.getElementById('toastContainer');
            container.innerHTML = toastHtml;
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }

        async function loadProducts() {
            try {
                updateDebugInfo('Chargement des produits...');
                console.log('Début chargement produits...');
                console.log('URL API:', API_URL);

                const response = await fetch(API_URL);
                console.log('Status response:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                products = await response.json();
                console.log('Produits reçus:', products);
                console.log('Nombre de produits:', products.length);

                document.getElementById('productCount').textContent = products.length;
                displayProducts(products);
                updateDebugInfo(`${products.length} produits chargés!`);
                showToast(`${products.length} produits chargés!`, 'success');

            } catch (error) {
                console.error('Erreur détaillée:', error);
                updateDebugInfo(`Erreur: ${error.message}`);
                showToast(`Erreur: ${error.message}`, 'error');
            } finally {
                document.getElementById('loadingSpinner').style.display = 'none';
            }
        }

        function displayProducts(productsToDisplay) {
            const grid = document.getElementById('productsGrid');
            const emptyState = document.getElementById('emptyState');

            if (productsToDisplay.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'flex';
            emptyState.style.display = 'none';

            grid.innerHTML = productsToDisplay.map(product => `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card product-card h-100">
                        <div class="card-img-top product-image d-flex align-items-center justify-content-center bg-light">
                            <i class="bi bi-box display-4 text-muted"></i>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${product.nom}</h5>
                            <p class="card-text flex-grow-1">
                                ${product.description}
                            </p>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <span class="h5 text-primary mb-0">
                                    ${product.prix.toFixed(2)} MAD
                                </span>
                                <span class="badge ${product.stock > 10 ? 'bg-success' : 'bg-warning'}">
                                    Stock: ${product.stock}
                                </span>
                            </div>
                            <button
                                class="btn btn-primary w-100"
                                onclick="addToCart(${product.id}, '${product.nom}', ${product.prix})"
                                disabled=${product.stock === 0}
                            >
                                <i class="bi bi-cart-plus"></i>
                                ${product.stock === 0 ? 'Indisponible' : 'Ajouter au panier'}
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                const filteredProducts = products.filter(product =>
                    product.nom.toLowerCase().includes(searchTerm) ||
                    product.description.toLowerCase().includes(searchTerm)
                );
                displayProducts(filteredProducts);
                updateDebugInfo(`Filtre: "${searchTerm}" - ${filteredProducts.length} produits`);
            });
        }

        async function addToCart(productId, productName, price) {
            try {
                console.log('Ajout au panier:', productName);

                const response = await fetch(`${CART_API_URL}/add`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        userId: 19,
                        productId: productId,
                        productName: productName,
                        price: price,
                        quantity: 1
                    })
                });

                const result = await response.json();
                console.log('Résultat ajout panier:', result);

                if (result.success) {
                    cart.push({ id: productId, name: productName, price: price });
                    updateCartIndicator();
                    showToast(`${productName} ajouté au panier!`, 'success');
                } else {
                    showToast('Erreur lors de l\'ajout au panier', 'error');
                }
            } catch (error) {
                console.error('Erreur ajout panier:', error);
                showToast(`Erreur: ${error.message}`, 'error');
            }
        }

        function updateCartIndicator() {
            const indicator = document.getElementById('cartIndicator');
            const count = document.getElementById('cartCount');
            
            if (cart.length > 0) {
                indicator.style.display = 'block';
                count.textContent = cart.length;
            } else {
                indicator.style.display = 'none';
            }
        }

        function viewCart() {
            showToast('Fonction panier à implémenter', 'info');
        }
    </script>
</body>
</html>
