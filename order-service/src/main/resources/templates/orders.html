<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mes Commandes - E-commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">E-commerce</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/products">Produits</a>
                <a class="nav-link" href="/orders">Mes Commandes</a>
                <a class="nav-link" href="/logout">Déconnexion</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Mes Commandes</h2>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div class="row">
            <div class="col-md-12">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Date</th>
                            <th>Total</th>
                            <th>Produits</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td th:text="${order.id}"></td>
                            <td th:text="${#temporals.format(order.date, 'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${order.total} + ' MAD'"></td>
                            <td>
                                <ul>
                                    <li th:each="product : ${order.orderProducts}" th:text="${product.quantite} x Produit " + ${product.produitId}"></li>
                                </ul>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
