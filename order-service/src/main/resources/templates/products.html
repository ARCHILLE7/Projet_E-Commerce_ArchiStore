<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Produits - E-commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="/">E-commerce</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/products">Produits</a>
                <a class="nav-link" href="/orders">Mes Commandes</a>
                <a class="nav-link" href="/logout">Déconnexion</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Produits Disponibles</h2>
        <div class="row">
            <div class="col-md-4" th:each="product : ${products}">
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${product.nom}"></h5>
                        <p class="card-text" th:text="${product.description}"></p>
                        <p class="card-text"><strong>Prix: </strong><span th:text="${product.prix} + ' MAD'"></span></p>
                        <p class="card-text"><strong>Stock: </strong><span th:text="${product.stock}"></span></p>
                        <button class="btn btn-primary" onclick="addToCart(this)" th:data-id="${product.id}">Ajouter au panier</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function addToCart(button) {
            const productId = button.getAttribute('data-id');

            alert('Produit ajouté au panier!');
        }
    </script>
</body>
</html>
